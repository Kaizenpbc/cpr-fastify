name: CI / CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend — typecheck & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --legacy-peer-deps
        working-directory: .
      - run: npx tsc --noEmit
      - run: npx vitest run

  frontend:
    name: Frontend — test & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --legacy-peer-deps
        working-directory: .
      - run: npx vitest run
      - run: VITE_API_URL=https://cpr.kpbc.ca/api/v1 npx vite build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 3

  deploy:
    name: Deploy to production
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      # Build backend
      - run: npm ci --legacy-peer-deps
      - run: cd backend && npx tsc
      - name: Remove sourcemaps from backend build
        run: find backend/dist -name '*.map' -delete

      # Download frontend build from previous job
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      # Deploy via lftp
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy backend via FTPS
        timeout-minutes: 15
        run: |
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" \
            -e "
              set ftp:ssl-allow yes;
              set ftp:ssl-force yes;
              set ftp:ssl-protect-data yes;
              set ftp:passive-mode yes;
              set ssl:verify-certificate no;
              set net:timeout 120;
              set net:max-retries 5;
              set net:reconnect-interval-base 10;
              set net:reconnect-interval-multiplier 2;
              set ftp:ssl-protect-list yes;
              set mirror:parallel-transfer-count 1;
              mirror -R --verbose --no-perms backend/dist/ cpr.kpbc.ca/backend/dist/;
              quit
            " \
            ftps://${{ secrets.FTP_SERVER }}

      - name: Deploy frontend via FTPS
        timeout-minutes: 15
        run: |
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" \
            -e "
              set ftp:ssl-allow yes;
              set ftp:ssl-force yes;
              set ftp:ssl-protect-data yes;
              set ftp:passive-mode yes;
              set ssl:verify-certificate no;
              set net:timeout 120;
              set net:max-retries 5;
              set net:reconnect-interval-base 10;
              set net:reconnect-interval-multiplier 2;
              set ftp:ssl-protect-list yes;
              set mirror:parallel-transfer-count 1;
              mirror -R --verbose --delete --no-perms frontend/dist/ cpr.kpbc.ca/public/;
              quit
            " \
            ftps://${{ secrets.FTP_SERVER }}

      # Restart Passenger
      - name: Restart application
        run: |
          curl -sk -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            "https://${{ secrets.FTP_SERVER }}:2083/json-api/cpanel?cpanel_jsonapi_version=2&cpanel_jsonapi_module=Fileman&cpanel_jsonapi_func=savefile&dir=/home/${{ secrets.FTP_USERNAME }}/cpr.kpbc.ca/tmp&filename=restart.txt&content=restart$(date +%s)" \
            > /dev/null 2>&1
          echo "Passenger restarted"

      # Health check
      - name: Health check
        run: |
          for i in 1 2 3 4 5; do
            sleep 10
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://cpr.kpbc.ca/api/v1/health)
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check: OK"
              exit 0
            fi
          done
          echo "Health check FAILED after 5 attempts"
          exit 1

  notify:
    name: Email notification
    needs: [backend, frontend, deploy]
    if: always() && github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Send success email
        if: needs.deploy.result == 'success'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CPR Deploy SUCCESS — ${{ github.sha }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: "CPR CI/CD <${{ secrets.SMTP_USERNAME }}>"
          body: |
            Deployment to cpr.kpbc.ca completed successfully.

            Commit: ${{ github.sha }}
            Message: ${{ github.event.head_commit.message }}
            By: ${{ github.actor }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send failure email
        if: needs.backend.result == 'failure' || needs.frontend.result == 'failure' || needs.deploy.result == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CPR Deploy FAILED — ${{ github.sha }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: "CPR CI/CD <${{ secrets.SMTP_USERNAME }}>"
          body: |
            Deployment to cpr.kpbc.ca FAILED.

            Commit: ${{ github.sha }}
            Message: ${{ github.event.head_commit.message }}
            By: ${{ github.actor }}

            Backend: ${{ needs.backend.result }}
            Frontend: ${{ needs.frontend.result }}
            Deploy: ${{ needs.deploy.result }}

            Check logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
